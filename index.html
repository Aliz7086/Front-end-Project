<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Font.css">
</head>
<body>
  <div class="main-area">
    <h2 class="page-title">My Book List</h2>

    <div class="section-box">
      <h5>Add a Book</h5>

      <div class="input-group">
        <div class="input-item">
          <input type="text" id="titleInput" class="form-control" placeholder="Title">
        </div>

        <div class="input-item">
          <input type="text" id="authorInput" class="form-control" placeholder="Author">
        </div>

        <div class="input-item">
          <input type="text" id="genreInput" class="form-control" placeholder="Genre">
        </div>

        <div class="input-item">
          <select id="statusInput" class="form-select">
            <option value="To Read">To Read</option>
            <option value="Reading">Reading</option>
            <option value="Completed">Completed</option>
          </select>
        </div>

        <div class="input-item">
          <select id="ratingInput" class="form-select">
            <option value="1">1 Star</option>
            <option value="2">2 Stars</option>
            <option value="3">3 Stars</option>
            <option value="4">4 Stars</option>
            <option value="5">5 Stars</option>
          </select>
        </div>

        <div class="input-item input-long">
          <input type="text" id="coverInput" class="form-control" placeholder="Cover URL (optional)">
        </div>

        <div class="input-item">
          <label class="form-label mb-1">Favorite</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="favoriteInput">
            <label class="form-check-label" for="favoriteInput">Yes</label>
          </div>
        </div>

        <div class="input-item button-item">
          <button class="btn btn-primary" onclick="addBook()">Add Book</button>
        </div>
      </div>

      <p id="message" class="mt-2"></p>
    </div>

    <div class="section-box">
      <div class="input-group">
        <div class="input-item search-item">
          <input type="text" id="searchInput" class="form-control" placeholder="Search by title or author" onkeyup="showBooks()">
        </div>

        <div class="input-item">
          <select id="genreFilter" class="form-select" onchange="showBooks()">
            <option value="all">All Genres</option>
          </select>
        </div>

        <div class="input-item">
          <select id="sortSelect" class="form-select" onchange="showBooks()">
            <option value="default">Sort By</option>
            <option value="title">Title</option>
            <option value="author">Author</option>
            <option value="rating">Rating</option>
            <option value="status">Status</option>
          </select>
        </div>
      </div>
    </div>

    <div id="bookList" class="book-list-area"></div>
  </div>

  <canvas id="confettiCanvas"></canvas>

  <script src="code.js"></script>
</body>
</html>
